<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>IURD Bolívia — Igrejas &amp; Correntes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a16;color:#e0e0e0;padding:12px;min-height:100vh;-webkit-text-size-adjust:100%;padding-bottom:60px}
h1{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.sub{font-size:11px;color:#666;margin-bottom:12px}
.grid-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.card{background:#13132a;border-radius:10px;padding:12px 10px;text-align:center}
.card .icons{font-size:18px;margin-bottom:4px}
.card .num{font-size:22px;font-weight:700;color:#fff}
.card .label{font-size:9px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Corrente do dia */
.corrente-destaque{background:linear-gradient(135deg,#1a1a4a,#13132a);border:1px solid #3b5ceb44;border-radius:12px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.corrente-destaque::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#3b5ceb,#7c5cf0,#3b5ceb);background-size:200% 100%;animation:gradSlide 3s ease infinite}
@keyframes gradSlide{0%{background-position:0 0}50%{background-position:100% 0}100%{background-position:0 0}}
.corrente-destaque .badge-hoje{display:inline-block;background:#3b5ceb;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 10px;border-radius:4px;margin-bottom:6px;letter-spacing:.5px}
.corrente-destaque .nome{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.corrente-destaque .horario{font-size:12px;color:#888;margin-bottom:4px}
.corrente-destaque .versiculo{font-size:13px;color:#9aa;font-style:italic;padding:8px 10px;background:#0a0a2244;border-radius:6px;margin-top:6px;border-left:3px solid #3b5ceb}

/* Lista de correntes */
.corrente-lista{background:#13132a;border-radius:10px;padding:12px;margin-bottom:12px}
.corrente-lista h3{font-size:12px;color:#999;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.corrente-item{padding:8px 0;border-bottom:1px solid #1e1e3a;display:flex;align-items:center;gap:10px}
.corrente-item:last-child{border-bottom:0}
.corrente-item .dia-badge{background:#1a1a3a;color:#777;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;min-width:60px;text-align:center}
.corrente-item.active .dia-badge{background:#3b5ceb;color:#fff}
.corrente-item .info{flex:1}
.corrente-item .info .nm{font-size:13px;color:#ddd;font-weight:500}
.corrente-item .info .vr{font-size:11px;color:#777;font-style:italic}
.corrente-item .active-indicator{width:4px;height:28px;border-radius:2px;background:#3b5ceb;flex-shrink:0}

/* Igrejas agrupadas por cidade */
.igrejas-section{background:#13132a;border-radius:10px;padding:12px;margin-bottom:12px}
.igrejas-section h3{font-size:12px;color:#999;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.cidade-group{margin-bottom:10px}
.cidade-group:last-child{margin-bottom:0}
.cidade-header{display:flex;align-items:center;gap:6px;padding:6px 0;margin-bottom:6px;border-bottom:1px solid #1e1e3a}
.cidade-header .nome{font-size:13px;font-weight:600;color:#3b5ceb}
.cidade-header .qtd{background:#1a1a3a;color:#888;font-size:9px;padding:1px 6px;border-radius:8px}
.cidade-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.igreja-card{background:#0f0f22;border-radius:8px;padding:8px 10px;transition:.2s}
.igreja-card .nm{font-size:12px;font-weight:500;color:#ddd;line-height:1.3}
.igreja-card .cidade{font-size:10px;color:#555;margin-top:2px}
.igreja-card .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.igreja-card .status-dot.ativa{background:#2ecc71}
.igreja-card .status-dot.inativa{background:#e74c3c}

/* Tab bar */
.tab-bar{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;border-radius:16px;background:#13132a;color:#777;font-size:11px;font-weight:600;white-space:nowrap;border:1px solid transparent;cursor:pointer;transition:.2s}
.tab.active{background:#3b5ceb;color:#fff;border-color:#3b5ceb}
.tab-content{display:none}
.tab-content.active{display:block}

/* Loader */
.loader{text-align:center;padding:60px 20px;color:#555;font-size:13px}
.loader .sp{display:inline-block;width:32px;height:32px;border:3px solid #1a1a3a;border-top-color:#3b5ceb;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Erro */
.err-box{background:#1e0f0f;border:1px solid #3a1a1a;border-radius:8px;padding:16px;color:#e74c3c;font-size:13px;text-align:center;margin-top:12px;line-height:1.6}
.err-box button{background:#3b5ceb;color:#fff;border:0;padding:8px 24px;border-radius:6px;font-size:14px;margin-top:10px;cursor:pointer}

.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:#2ecc71;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

.dias-semana{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.dia-box{padding:6px 2px;border-radius:6px;text-align:center;background:#0f0f22;font-size:10px;color:#555;cursor:pointer;transition:.2s}
.dia-box.active{background:#3b5ceb;color:#fff;font-weight:600}
.dia-box .letra{font-size:11px;text-transform:uppercase}

@media(max-width:375px){
  .cidade-grid{grid-template-columns:1fr}
  .grid-cards{grid-template-columns:1fr 1fr 1fr;gap:5px}
  .card{padding:8px 6px}
  .card .num{font-size:18px}
}
</style>
</head>
<body>
<div id="app">
  <div class="loader" id="loadingScreen">
    <div class="sp"></div>
    <div>Carregando IURD Bolívia...</div>
  </div>
</div>

<script>
const DIRECTUS = '/directus';
const DIAS = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const DIAS_SHORT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let TOKEN = '';

async function login() {
  const r = await fetch(DIRECTUS + '/auth/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:'paginaweb.bolivia@gmail.com',password:'Uni2026!'})
  });
  const j = await r.json();
  TOKEN = j.data.access_token;
}

async function api(path) {
  const r = await fetch(DIRECTUS + '/items/' + path, {
    headers:{'Authorization':'Bearer ' + TOKEN}
  });
  const j = await r.json();
  return j.data || [];
}

async function apiCount(path) {
  const r = await fetch(DIRECTUS + '/items/' + path, {
    headers:{'Authorization':'Bearer ' + TOKEN}
  });
  const j = await r.json();
  return j.data?.[0]?.count || 0;
}

async function render() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loader"><div class="sp"></div><div>Carregando dados...</div></div>`;

  try {
    await login();

    const [igrejas, correntes] = await Promise.all([
      api('igrejas?limit=100&fields=id,nome,cidade,whatsapp,ativo&sort=nome'),
      api('correntes?limit=10&fields=id,nome,dia_semana,versiculo,tema,horario'),
    ]);

    // Pastores count via aggregate
    const pResp = await fetch(DIRECTUS + '/items/pastores?aggregate%5Bcount%5D=*', {
      headers:{'Authorization':'Bearer ' + TOKEN}
    });
    const pJson = await pResp.json();
    const cntPastores = pJson.data?.[0]?.count || 0;

    // Stats
    const totalIgrejas = igrejas.length;
    const cidades = [...new Set(igrejas.map(i=>i.cidade).filter(Boolean))];
    const totalCidades = cidades.length;

    // Agrupar igrejas por cidade
    const grupos = {};
    igrejas.forEach(i => {
      const cid = i.cidade || 'Sem cidade';
      if(!grupos[cid]) grupos[cid] = [];
      grupos[cid].push(i);
    });
    const cidadesOrdenadas = Object.keys(grupos).sort();

    // Corrente do dia
    const hoje = new Date().getDay();
    const correnteHoje = correntes.find(c => c.dia_semana === hoje);
    const correntesOrdenadas = correntes.sort((a,b) => (a.dia_semana||0) - (b.dia_semana||0));

    // Formatar horario (JSON array like ["06:30","10:00"])
    function fmtHorario(h) {
      if(!h) return '';
      try {
        const arr = JSON.parse(h);
        if(Array.isArray(arr)) return arr.join(', ');
        return h;
      } catch(e) {
        return typeof h === 'string' ? h.substring(0,5) : '';
      }
    }

    // Montar HTML
    const html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div>
        <h1>⛪ IURD Bolívia</h1>
        <div class="sub"><span class="pulse"></span>${new Date().toLocaleString('pt-BR',{timeZone:'America/La_Paz'})}</div>
      </div>
      <button onclick="render()" style="background:#1a1a3a;border:0;color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer" title="Atualizar">⟳</button>
    </div>

    <div class="grid-cards">
      <div class="card">
        <div class="icons">🏛️</div>
        <div class="num">${totalIgrejas}</div>
        <div class="label">Igrejas</div>
      </div>
      <div class="card">
        <div class="icons">📍</div>
        <div class="num">${totalCidades}</div>
        <div class="label">Cidades</div>
      </div>
      <div class="card">
        <div class="icons">👤</div>
        <div class="num">${cntPastores}</div>
        <div class="label">Pastores</div>
      </div>
    </div>

    ${correnteHoje ? `
    <div class="corrente-destaque">
      <div class="badge-hoje">🔥 Corrente de Hoje</div>
      <div class="nome">${correnteHoje.nome}</div>
      <div class="horario">${DIAS[correnteHoje.dia_semana]} ${correnteHoje.horario ? '· '+fmtHorario(correnteHoje.horario) : ''}</div>
      ${correnteHoje.tema ? `<div style="font-size:12px;color:#999;margin-top:2px">${correnteHoje.tema}</div>` : ''}
      ${correnteHoje.versiculo ? `<div class="versiculo">📖 ${correnteHoje.versiculo}</div>` : ''}
    </div>` : ''}

    <div class="dias-semana">
      ${[0,1,2,3,4,5,6].map(dia => {
        const c = correntesOrdenadas.find(c => c.dia_semana === dia);
        return `<div class="dia-box ${dia === hoje ? 'active' : ''}" onclick="scrollToDia(${dia})">
          <div class="letra">${DIAS_SHORT[dia]}</div>
          <div style="font-size:8px;margin-top:2px;opacity:0.7">${c ? (c.nome||'').substring(0,8) : '—'}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="corrente-lista">
      <h3>📅 Correntes da Semana</h3>
      ${correntesOrdenadas.map(c => `
        <div class="corrente-item ${c.dia_semana === hoje ? 'active' : ''}" id="corrente-${c.dia_semana}">
          ${c.dia_semana === hoje ? '<div class="active-indicator"></div>' : ''}
          <span class="dia-badge">${DIAS[c.dia_semana]||'?'}</span>
          <div class="info">
            <div class="nm">${c.nome}</div>
            ${c.versiculo ? `<div class="vr">${c.versiculo}</div>` : ''}
          </div>
          ${c.horario ? `<span style="font-size:10px;color:#555;white-space:nowrap">${fmtHorario(c.horario)}</span>` : ''}
        </div>
      `).join('')}
    </div>

    <div class="tab-bar">
      <button class="tab active" data-t="igrejas">🏛️ Igrejas (${totalIgrejas})</button>
      <button class="tab" data-t="por-cidade">📍 Por Cidade</button>
    </div>

    <div class="tab-content active" id="t-igrejas">
      <div class="igrejas-section">
        <h3>🏛️ Todas as Igrejas</h3>
        <div class="cidade-grid" style="grid-template-columns:1fr">
          ${igrejas.map(i => `
            <div class="igreja-card" style="display:flex;align-items:center;gap:8px">
              <span class="status-dot ${i.ativo === 1 || i.ativo === true ? 'ativa' : 'inativa'}"></span>
              <div style="flex:1">
                <div class="nm">${i.nome}</div>
                <div class="cidade">${i.cidade||''}${i.whatsapp && i.whatsapp !== '—' ? ' · '+i.whatsapp : ''}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="tab-content" id="t-por-cidade">
      <div class="igrejas-section">
        <h3>📍 Igrejas por Cidade</h3>
        ${cidadesOrdenadas.map(cid => `
          <div class="cidade-group">
            <div class="cidade-header">
              <span style="font-size:14px">📍</span>
              <span class="nome">${cid}</span>
              <span class="qtd">${grupos[cid].length}</span>
            </div>
            <div class="cidade-grid">
              ${grupos[cid].map(i => `
                <div class="igreja-card">
                  <div class="nm">${i.nome}</div>
                  <div class="cidade">${i.whatsapp && i.whatsapp !== '—' ? '📞 '+i.whatsapp : ''}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div style="text-align:center;padding:16px 0;font-size:10px;color:#444">
      IURD Bolívia · ${new Date().toLocaleDateString('pt-BR')} · ⚡
    </div>`;

    app.innerHTML = html;

  } catch(e) {
    app.innerHTML = `<div class="err-box">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <div>Erro ao carregar dados</div>
      <div style="font-size:11px;color:#886;margin-top:8px">${e.message||'Tente novamente'}</div>
      <button onclick="render()">Tentar novamente</button>
    </div>`;
  }
}

// Tab switching
document.addEventListener('click', function(e) {
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  const el = document.getElementById('t-'+tab.dataset.t);
  if(el) el.classList.add('active');
});

function scrollToDia(dia) {
  const el = document.getElementById('corrente-'+dia);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

// Init
render();
</script>
</body>
</html>
