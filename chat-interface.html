<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Chat — Directus</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#111b21;color:#e9edef;height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#374045;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#4a5568}

  .app{display:flex;height:100vh}
  /* ── Sidebar ── */
  .sidebar{width:320px;min-width:320px;background:#111b21;border-right:1px solid #2a3942;display:flex;flex-direction:column}
  .sidebar-header{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:10px;min-height:56px}
  .sidebar-header h1{font-size:16px;font-weight:600;color:#e9edef;flex:1}
  .sidebar-header .badge{background:#00a884;color:#111b21;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
  .search-box{padding:8px 12px;background:#111b21}
  .search-box input{width:100%;padding:8px 12px;border:none;border-radius:8px;background:#202c33;color:#e9edef;font-size:14px;outline:none}
  .search-box input::placeholder{color:#8696a0}
  .conversation-list{flex:1;overflow-y:auto}
  .conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #1f2c33;transition:background .15s}
  .conv-item:hover{background:#202c33}
  .conv-item.active{background:#2a3942}
  .conv-item.urgente{border-left:3px solid #ef4444}
  .conv-avatar{width:48px;height:48px;border-radius:50%;background:#2a3942;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#00a884;flex-shrink:0}
  .conv-info{flex:1;min-width:0}
  .conv-name{font-size:15px;font-weight:500;color:#e9edef;display:flex;justify-content:space-between;align-items:center}
  .conv-time{font-size:12px;color:#8696a0;white-space:nowrap}
  .conv-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;margin-top:2px}
  .conv-badge{background:#00a884;color:#111b21;font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center}
  .conv-urgent-icon{color:#ef4444;font-size:14px;margin-left:4px}

  /* ── Chat ── */
  .chat-area{flex:1;display:flex;flex-direction:column;background:#0b141a}
  .chat-header{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:56px;border-bottom:1px solid #2a3942}
  .chat-avatar{width:40px;height:40px;border-radius:50%;background:#2a3942;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#00a884;flex-shrink:0}
  .chat-header-info{flex:1;min-width:0}
  .chat-header-name{font-size:15px;font-weight:500;color:#e9edef}
  .chat-header-phone{font-size:12px;color:#8696a0}
  .chat-header-urgent{background:#ef4444;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
  .messages-container{flex:1;overflow-y:auto;padding:16px 40px;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect width="400" height="400" fill="%230b141a"/><circle cx="40" cy="40" r="1.5" fill="%23111b21"/><circle cx="120" cy="80" r="1" fill="%23111b21"/><circle cx="200" cy="30" r="1.5" fill="%23111b21"/><circle cx="300" cy="100" r="1" fill="%23111b21"/><circle cx="80" cy="150" r="1.5" fill="%23111b21"/><circle cx="250" cy="200" r="1" fill="%23111b21"/><circle cx="350" cy="180" r="1.5" fill="%23111b21"/><circle cx="50" cy="280" r="1" fill="%23111b21"/><circle cx="180" cy="320" r="1.5" fill="%23111b21"/><circle cx="320" cy="350" r="1" fill="%23111b21"/></svg>') repeat}
  .message{display:flex;margin-bottom:8px;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.received{justify-content:flex-start}
  .message.sent{justify-content:flex-end}
  .message-bubble{max-width:65%;padding:8px 12px;border-radius:8px;font-size:14px;line-height:1.4;word-wrap:break-word;position:relative}
  .message.received .message-bubble{background:#202c33;color:#e9edef;border-top-left-radius:0}
  .message.sent .message-bubble{background:#005c4b;color:#e9edef;border-top-right-radius:0}
  .message-time{font-size:11px;color:#8696a0;text-align:right;margin-top:4px}
  .message.sent .message-time{color:#87c2a5}
  .date-separator{text-align:center;margin:16px 0;color:#8696a0;font-size:12px}
  .date-separator span{background:#182229;padding:4px 12px;border-radius:8px}
  .no-messages{text-align:center;color:#8696a0;margin-top:40%;font-size:14px}
  .typing-indicator{display:flex;gap:4px;padding:4px 0}
  .typing-dot{width:8px;height:8px;background:#8696a0;border-radius:50%;animation:typing 1.4s infinite}
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}

  /* ── Input ── */
  .chat-input-area{background:#202c33;padding:8px 16px;display:flex;align-items:center;gap:8px}
  .chat-input-area textarea{flex:1;background:#2a3942;border:none;border-radius:8px;padding:10px 12px;color:#e9edef;font-size:14px;resize:none;outline:none;font-family:inherit;max-height:100px}
  .chat-input-area textarea::placeholder{color:#8696a0}
  .btn-send{width:44px;height:44px;border-radius:50%;border:none;background:#00a884;color:#111b21;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
  .btn-send:hover{background:#06cf9c}
  .btn-send:disabled{background:#2a3942;color:#8696a0;cursor:not-allowed}

  /* ── Panel ── */
  .panel{width:320px;min-width:320px;background:#111b21;border-left:1px solid #2a3942;display:flex;flex-direction:column}
  .panel-header{background:#202c33;padding:12px 16px;min-height:56px;display:flex;align-items:center}
  .panel-header h2{font-size:15px;font-weight:600;color:#e9edef}
  .panel-body{flex:1;overflow-y:auto;padding:16px}
  .panel-section{margin-bottom:20px}
  .panel-section-title{font-size:12px;font-weight:600;color:#00a884;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f2c33;font-size:13px}
  .info-label{color:#8696a0}
  .info-value{color:#e9edef;text-align:right;max-width:60%;word-break:break-word}
  .info-value.consent-yes{color:#00a884}
  .info-value.consent-no{color:#ef4444}

  /* Pendentes */
  .pendente-card{background:#1f2c33;border-radius:8px;padding:12px;margin-bottom:10px;border-left:3px solid #f59e0b}
  .pendente-card.urgente{border-left-color:#ef4444}
  .pendente-original{font-size:12px;color:#8696a0;margin-bottom:4px;font-style:italic}
  .pendente-original::before{content:'"'}
  .pendente-original::after{content:'"'}
  .pendente-resposta{font-size:13px;color:#e9edef;margin:6px 0;background:#2a3942;padding:8px;border-radius:6px}
  .pendente-confianca{font-size:11px;color:#8696a0;margin-bottom:8px}
  .pendente-confianca strong{color:#f59e0b}
  .btn-aprovar{width:100%;padding:8px;border:none;border-radius:6px;background:#00a884;color:#111b21;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
  .btn-aprovar:hover{background:#06cf9c}
  .btn-aprovar:disabled{background:#2a3942;color:#8696a0;cursor:not-allowed}
  .no-pendentes{color:#8696a0;font-size:13px;text-align:center;padding:20px 0}
  .loading-spinner{text-align:center;padding:20px;color:#8696a0}
  .loading-spinner::after{content:'';display:inline-block;width:20px;height:20px;border:2px solid #2a3942;border-top-color:#00a884;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8696a0;text-align:center;padding:40px}
  .empty-state .icon{font-size:64px;margin-bottom:16px;opacity:.3}
  .empty-state h3{font-size:18px;margin-bottom:8px;color:#e9edef}
  .empty-state p{font-size:13px;max-width:300px}

  /* Scroll suave */
  .messages-container{scroll-behavior:smooth}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>📱 WhatsApp</h1>
      <span class="badge" id="convCount">0</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar conversa..." oninput="filterConversations(this.value)">
    </div>
    <div class="conversation-list" id="convList"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="chat-avatar" id="chatAvatar">?</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatName">Selecione uma conversa</div>
        <div class="chat-header-phone" id="chatPhone"></div>
      </div>
      <span class="chat-header-urgent" id="chatUrgentBadge" style="display:none">🔴 Urgente</span>
    </div>
    <div class="messages-container" id="messagesContainer">
      <div class="empty-state">
        <div class="icon">💬</div>
        <h3>WhatsApp Chat</h3>
        <p>Selecione uma conversa no painel esquerdo para começar</p>
      </div>
    </div>
    <div class="chat-input-area" id="chatInputArea" style="display:none">
      <textarea id="msgInput" rows="1" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>▶</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="panel">
    <div class="panel-header"><h2>📋 Dados da Pessoa</h2></div>
    <div class="panel-body" id="panelBody">
      <div class="empty-state" style="height:auto;padding:30px 10px">
        <p style="font-size:13px">Selecione uma conversa para ver os detalhes</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──
const API_URL = 'http://localhost:3098';
let currentPessoaId = null;
let conversations = [];
let pollTimer = null;

// ── Data Fetching ──
async function loadConversations(search = '') {
  try {
    const url = search ? `${API_URL}/pessoas?search=${encodeURIComponent(search)}` : `${API_URL}/pessoas`;
    const resp = await fetch(url);
    const data = await resp.json();
    conversations = data.data || [];
    renderConversations(conversations);
    document.getElementById('convCount').textContent = conversations.length;
  } catch(e) {
    console.error('Erro ao carregar conversas:', e);
  }
}

function filterConversations(value) {
  loadConversations(value);
}

function renderConversations(convs) {
  const list = document.getElementById('convList');
  list.innerHTML = '';
  convs.forEach(c => {
    const pessoa = c.pessoa_id || {};
    const nome = pessoa.nome || pessoa.telefone || 'Desconhecido';
    const iniciais = (pessoa.nome || pessoa.telefone || '??').replace(/@.*$/, '').substring(0,2).toUpperCase();
    const isActive = currentPessoaId && Number(pessoa.id) === Number(currentPessoaId);
    const urgente = c.status === 'urgente';
    const naoLidas = c.nao_lidas || 0;
    const ultima = c.ultima_mensagem || '';
    const tempo = formatTime(c.ultima_data);

    const div = document.createElement('div');
    div.className = `conv-item${isActive ? ' active' : ''}${urgente ? ' urgente' : ''}`;
    div.onclick = () => selectConversation(pessoa);
    div.innerHTML = `
      <div class="conv-avatar">${iniciais}</div>
      <div class="conv-info">
        <div class="conv-name">
          <span>${escapeHtml(nome)}</span>
          <span class="conv-time">${tempo}</span>
        </div>
        <div class="conv-preview">
          ${escapeHtml(ultima.substring(0,60))}
          ${urgente ? '<span class="conv-urgent-icon">🔴</span>' : ''}
        </div>
      </div>
      ${naoLidas > 0 ? `<div class="conv-badge">${naoLidas}</div>` : ''}
    `;
    list.appendChild(div);
  });
}

// ── Conversation Selection ──
async function selectConversation(pessoa) {
  if (!pessoa || !pessoa.id) return;
  currentPessoaId = pessoa.id;
  
  // Destacar na sidebar
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  const items = document.getElementById('convList').children;
  for (let item of items) {
    if (item.querySelector('.conv-name span')?.textContent === (pessoa.nome || pessoa.telefone)) {
      item.classList.add('active');
      break;
    }
  }

  // Atualizar header
  const nome = pessoa.nome || pessoa.telefone || 'Desconhecido';
  document.getElementById('chatAvatar').textContent = (pessoa.nome || pessoa.telefone || '?').replace(/@.*$/, '').substring(0,2).toUpperCase();
  document.getElementById('chatName').textContent = nome;
  document.getElementById('chatPhone').textContent = pessoa.telefone || '';
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('chatInputArea').style.display = 'flex';
  document.getElementById('btnSend').disabled = false;

  // Badge urgente
  const urgBadge = document.getElementById('chatUrgentBadge');
  const conv = conversations.find(c => {
    const p = c.pessoa_id || {};
    return Number(p.id) === Number(currentPessoaId);
  });
  urgBadge.style.display = conv && conv.status === 'urgente' ? 'inline' : 'none';

  // Carregar mensagens
  await loadMessages(currentPessoaId);
  // Carregar painel direito
  await loadPersonPanel(pessoa);
  // Carregar pendentes
  await loadPendentes(currentPessoaId);
  
  // Iniciar polling
  startPolling();
}

async function loadMessages(pessoaId) {
  try {
    const resp = await fetch(`${API_URL}/mensagens?pessoa_id=${pessoaId}`);
    const data = await resp.json();
    renderMessages(data.data || []);
  } catch(e) {
    console.error('Erro ao carregar mensagens:', e);
  }
}

function renderMessages(messages) {
  const container = document.getElementById('messagesContainer');
  container.innerHTML = '';

  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="no-messages">Nenhuma mensagem ainda. Envie uma mensagem para iniciar a conversa.</div>';
    return;
  }

  let lastDate = '';
  messages.forEach(msg => {
    const data = msg.data_envio || '';
    const dataDate = data.substring(0,10);
    
    // Separador de data
    if (dataDate !== lastDate) {
      lastDate = dataDate;
      const sep = document.createElement('div');
      sep.className = 'date-separator';
      sep.innerHTML = `<span>${formatDate(dataDate)}</span>`;
      container.appendChild(sep);
    }

    const isSent = msg.remetente === 'ADMIN' || msg.remetente === 'admin';
    const div = document.createElement('div');
    div.className = `message ${isSent ? 'sent' : 'received'}`;
    
    // Classificação
    let classtag = '';
    if (msg.classificacao && msg.classificacao !== 'normal' && msg.classificacao !== 'admin') {
      classtag = `<span style="font-size:11px;color:#f59e0b;display:block;margin-bottom:2px">#${msg.classificacao}</span>`;
    }

    div.innerHTML = `
      <div class="message-bubble">
        ${classtag}
        ${escapeHtml(msg.texto || '')}
        <div class="message-time">${formatTime(data)}</div>
      </div>
    `;
    container.appendChild(div);
  });

  // Scroll to bottom
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

// ── Send Message ──
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentPessoaId) return;

  // Find phone
  const conv = conversations.find(c => {
    const p = c.pessoa_id || {};
    return Number(p.id) === Number(currentPessoaId);
  });
  const pessoa = conv ? conv.pessoa_id : null;
  const telefone = pessoa ? pessoa.telefone : '';
  
  if (!telefone) {
    showToast('Telefone não encontrado para esta pessoa');
    return;
  }

  input.disabled = true;
  document.getElementById('btnSend').disabled = true;

  try {
    const resp = await fetch(`${API_URL}/enviar`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        telefone: telefone,
        texto: text,
        pessoa_id: currentPessoaId,
      }),
    });
    const result = await resp.json();
    
    if (result.sucesso) {
      input.value = '';
      input.style.height = 'auto';
      // Adiciona mensagem na UI imediatamente
      addOptimisticMessage(text, 'sent');
      await loadMessages(currentPessoaId);
    } else {
      showToast('Erro ao enviar: ' + (result.erro || 'Desconhecido'));
    }
  } catch(e) {
    showToast('Erro de conexão: ' + e.message);
  } finally {
    input.disabled = false;
    document.getElementById('btnSend').disabled = false;
    input.focus();
  }
}

function addOptimisticMessage(text, type) {
  const container = document.getElementById('messagesContainer');
  // Remove empty state
  const empty = container.querySelector('.no-messages');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = `
    <div class="message-bubble" style="opacity:0.7">
      ${escapeHtml(text)}
      <div class="message-time">enviando...</div>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── Right Panel ──
async function loadPersonPanel(pessoa) {
  const panel = document.getElementById('panelBody');
  
  const igrejaNome = pessoa.igreja_nome || (pessoa.igreja_id ? `ID: ${pessoa.igreja_id}` : '—');
  const consentimento = pessoa.consentimento ? '✅ Sim' : '❌ Não';
  const consentClass = pessoa.consentimento ? 'consent-yes' : 'consent-no';
  const origem = pessoa.origem || '—';
  const nome = pessoa.nome || pessoa.telefone || 'Desconhecido';
  const telefone = pessoa.telefone || '—';

  panel.innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Informações</div>
      <div class="info-row"><span class="info-label">Nome</span><span class="info-value">${escapeHtml(nome)}</span></div>
      <div class="info-row"><span class="info-label">Telefone</span><span class="info-value">${escapeHtml(telefone)}</span></div>
      <div class="info-row"><span class="info-label">Igreja</span><span class="info-value">${escapeHtml(igrejaNome)}</span></div>
      <div class="info-row"><span class="info-label">Consentimento</span><span class="info-value ${consentClass}">${consentimento}</span></div>
      <div class="info-row"><span class="info-label">Origem</span><span class="info-value">${escapeHtml(origem)}</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Respostas IA Pendentes</div>
      <div id="pendentesContainer">
        <div class="loading-spinner">Carregando...</div>
      </div>
    </div>
  `;
}

async function loadPendentes(pessoaId) {
  const container = document.getElementById('pendentesContainer');
  if (!container) return;

  try {
    const resp = await fetch(`${API_URL}/pendentes?pessoa_id=${pessoaId}`);
    const data = await resp.json();
    const pendentes = data.data || [];
    
    if (pendentes.length === 0) {
      container.innerHTML = '<div class="no-pendentes">✅ Nenhuma resposta pendente</div>';
      return;
    }

    container.innerHTML = '';
    pendentes.forEach(p => {
      const urgente = p.classificacao === 'urgente' || p.classificacao === 'alta';
      const card = document.createElement('div');
      card.className = `pendente-card${urgente ? ' urgente' : ''}`;
      card.innerHTML = `
        <div class="pendente-original">${escapeHtml(p.msg_original || '')}</div>
        <div class="pendente-resposta">${escapeHtml(p.resposta_ia || '')}</div>
        <div class="pendente-confianca">
          Confiança: <strong>${p.confianca_ia || 0}%</strong>
          ${urgente ? '🔴 Urgente' : ''}
        </div>
        <button class="btn-aprovar" onclick="aprovarPendente(${p.id}, this)">
          ✅ Aprovar e Enviar
        </button>
      `;
      container.appendChild(card);
    });
  } catch(e) {
    console.error('Erro ao carregar pendentes:', e);
    if (container) container.innerHTML = '<div class="no-pendentes">Erro ao carregar</div>';
  }
}

async function aprovarPendente(id, btn) {
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';
  
  try {
    const resp = await fetch(`${API_URL}/aprovar`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id: id}),
    });
    const result = await resp.json();
    
    if (result.sucesso) {
      showToast('✅ Resposta aprovada e enviada!');
      btn.textContent = '✅ Enviado';
      btn.style.background = '#2a3942';
      // Recarregar
      setTimeout(() => {
        loadPendentes(currentPessoaId);
        loadMessages(currentPessoaId);
      }, 500);
    } else {
      showToast('❌ Erro: ' + (result.erro || 'Desconhecido'));
      btn.disabled = false;
      btn.textContent = '✅ Aprovar e Enviar';
    }
  } catch(e) {
    showToast('❌ Erro de conexão');
    btn.disabled = false;
    btn.textContent = '✅ Aprovar e Enviar';
  }
}

// ── Polling ──
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    if (currentPessoaId) {
      loadMessages(currentPessoaId);
      loadPendentes(currentPessoaId);
      loadConversations();
    }
  }, 10000);
}

// ── Helpers ──
function formatTime(dateStr) {
  if (!dateStr) return '';
  try {
    const parts = dateStr.split(/[- :T]/);
    if (parts.length >= 3) {
      const h = parts[3] || '00';
      const m = parts[4] || '00';
      return `${h}:${m}`;
    }
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr.substring(11,16) || '';
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  } catch(e) {
    return dateStr.substring(11,16) || '';
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const today = new Date().toISOString().substring(0,10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().substring(0,10);
  
  if (dateStr === today) return 'Hoje';
  if (dateStr === yesterday) return 'Ontem';
  
  try {
    const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
    const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
  } catch(e) {
    return dateStr;
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();
  
  const div = document.createElement('div');
  div.className = 'toast-msg';
  div.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#202c33;color:#e9edef;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4);animation:fadeIn .2s';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity .3s'; setTimeout(() => div.remove(), 300); }, 3000);
}

// Auto-resize textarea
document.getElementById('msgInput')?.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ── Init ──
loadConversations();
</script>
